name: Stock Alert Scanner

# 🕐 ตารางเวลา (เวลา UTC): ครอบคลุมช่วงตลาดหุ้นไทยเปิด (~03:00-10:00 UTC = 10:00-17:00 ICT)
# และตลาดหุ้นสหรัฐฯ เปิด (~13:00-21:00 UTC = ครอบคลุม pre/post market เล็กน้อย) เฉพาะวันจันทร์-ศุกร์
# ตั้งทุก 30 นาทีเพื่อประหยัดโควตา Actions minutes (ถ้า repo เป็น public ใช้ฟรีไม่จำกัด
# ปรับเป็น */15 ได้ถ้าต้องการถี่ขึ้น)
on:
  schedule:
    - cron: '*/30 3-10,13-21 * * 1-5'
  workflow_dispatch: {}  # กดรันเองได้จากแท็บ Actions บน GitHub เพื่อทดสอบ

permissions:
  contents: write  # ต้องมีสิทธิ์เขียน เพื่อ commit ไฟล์ alert_state.json กลับเข้า repo

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests
          # 🔧 แก้บั๊ก SSL certificate mismatch กับ fc.yahoo.com บน GitHub Actions runner:
          # yfinance เวอร์ชันใหม่ใช้ curl_cffi (TLS impersonation) เป็นค่าเริ่มต้น ซึ่งบางครั้งเจอ
          # ปัญหา SSL handshake กับ fc.yahoo.com บนเครือข่ายของ GitHub Actions โดยเฉพาะ
          # ถอด curl_cffi ออก เพื่อบังคับให้ yfinance fallback ไปใช้ requests library ธรรมดาแทน
          # (yfinance รองรับ fallback นี้อยู่แล้วตั้งแต่เวอร์ชัน 1.3.0+ เป็นทางการ)
          pip uninstall -y curl_cffi

      - name: Run alert scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_LEVELS: 'STRONG_BUY,STRONG_SELL'
        run: python alert_scanner.py

      - name: Commit updated alert state
        continue-on-error: true  # ถ้า push ไม่สำเร็จในที่สุด ไม่ต้องให้ทั้ง workflow ขึ้น "failed"
                                  # เพราะงานสำคัญ (สแกน + ส่งแจ้งเตือน) สำเร็จไปแล้วก่อนหน้านี้
        run: |
          git config user.name "alert-scanner-bot"
          git config user.email "actions@github.com"
          git add alert_state.json
          if git diff --staged --quiet; then
            echo "ไม่มีการเปลี่ยนแปลงสถานะ ข้ามการ commit"
            exit 0
          fi
          git commit -m "🔄 อัปเดตสถานะเรตติ้งล่าสุดจากการสแกน [skip ci]"
          # 🔧 กัน race condition: ลองดึงของล่าสุดมา rebase แล้ว push ซ้ำสูงสุด 3 ครั้ง
          # เผื่อมีคน/บอทอื่น push ชนกันพอดี (เช่นรัน 2 รอบซ้อนกัน หรือพี่ push มือพร้อมกัน)
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              echo "✅ push สำเร็จ (ครั้งที่ $i)"
              exit 0
            fi
            echo "⚠️ push ไม่สำเร็จ ครั้งที่ $i กำลังลองใหม่..."
            sleep 5
          done
          echo "⚠️ push ไม่สำเร็จหลังลอง 3 ครั้ง แต่การสแกน+แจ้งเตือนสำเร็จไปแล้ว จะลองใหม่ในรอบถัดไป"
